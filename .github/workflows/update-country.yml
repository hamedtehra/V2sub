name: Update Subscription Country

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download subscriptions
        run: |
          rm -f sub-country.txt

          curl -L "https://raw.githubusercontent.com/Epodonios/v2ray-configs/refs/heads/main/Sub1.txt" >> sub-country.txt
          echo "" >> sub-country.txt

          curl -L "https://raw.githubusercontent.com/Epodonios/v2ray-configs/refs/heads/main/Sub2.txt" >> sub-country.txt
          echo "" >> sub-country.txt

          curl -L "https://raw.githubusercontent.com/Epodonios/v2ray-configs/refs/heads/main/Sub3.txt" >> sub-country.txt

      - name: Add country tags
        run: |
          python3 <<'PY'
          import re
          import urllib.request
          import json

          file = "sub-country.txt"

          with open(file, "r", encoding="utf-8", errors="ignore") as f:
              data = f.read()

          flags = {
              "DE": "🇩🇪",
              "US": "🇺🇸",
              "NL": "🇳🇱",
              "FR": "🇫🇷",
              "GB": "🇬🇧",
              "FI": "🇫🇮",
              "SE": "🇸🇪",
              "SG": "🇸🇬",
              "JP": "🇯🇵"
          }

          def replace_name(match):
              return "#Luxid.vip | 🌍"

          data = re.sub(r"#EPODONIOS", replace_name, data)

          with open(file, "w", encoding="utf-8") as f:
              f.write(data)

          PY

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add sub-country.txt
          git commit -m "Update Country Subscription" || echo "No changes"
          git push